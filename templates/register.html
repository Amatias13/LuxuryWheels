<!doctype html>

<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewpout" />
    <meta content="ie=edge" http-equiv="X-UA-Compatible" />
    <title>Luxury Wheels - HTML Template</title>
    <!-- site favicon -->
    <link href="assets/images/favicon.jpg" rel="shoutcut icon" type="image/png" />
    <!-- fontawesome css link -->
    <link href="assets/css/fontawesome.min.css" rel="stylesheet" />
    <!-- bootstrap css link -->
    <link href="assets/css/bootstrap.min.css" rel="stylesheet" />
    <!-- lightcase css link -->
    <link href="assets/css/lightcase.css" rel="stylesheet" />
    <!-- animate css link -->
    <link href="assets/css/animate.css" rel="stylesheet" />
    <!-- nice select css link -->
    <link href="assets/css/nice-select.css" rel="stylesheet" />
    <!-- datepicker css link -->
    <link href="assets/css/datepicker.min.css" rel="stylesheet" />
    <!-- wickedpicker css link -->
    <link href="assets/css/wickedpicker.min.css" rel="stylesheet" />
    <!-- jquery ui css link -->
    <link href="assets/css/jquery-ui.min.css" rel="stylesheet" />
    <!-- owl carousel css link -->
    <link href="assets/css/owl.carousel.min.css" rel="stylesheet" />
    <!-- main style css link -->
    <link href="assets/css/main.css" rel="stylesheet" />
  </head>
  <body>
    <!--  header-section start  -->
    {% include 'partials/navbar.html' %}
    <!-- inner-page-banner start -->
    <section class="inner-page-banner bg_img overlay-3" data-background="assets/images/inner-page-bg.jpg">
      <div class="container">
        <div class="row">
          <div class="col-md-12">
            <h2 class="page-title">Criar nova conta</h2>
            <ol class="page-list">
              <li>
                <a href="{{ url_for('home') }}"><i class="fa fa-home"></i>Início</a>
              </li>
              <li>Registo</li>
            </ol>
          </div>
        </div>
      </div>
    </section>
    <!-- inner-page-banner end -->
    <!-- registration-section start -->
    <section class="registration-section pt-120 pb-120">
      <div class="container">
        <div class="row">
          <div class="col-lg-12">
            <div class="registration-block text-center">
              <div class="registration-block-inner">
                <h3 class="title">crie a sua conta</h3>
                <form class="registration-form" method="post" action="{{ url_for('users.register') }}">
                  <div class="frm-group">
                    <input id="firstName" name="firstName" placeholder="Primeiro nome" type="text" required />
                  </div>
                  <div class="frm-group">
                    <input id="lastName" name="lastName" placeholder="Último nome" type="text" required />
                  </div>
                  <div class="frm-group">
                    <input id="email" name="email" placeholder="O seu email" type="email" required />
                  </div>
                  <div class="frm-group">
                    <input id="password" name="password" placeholder="Password" type="password" required />
                  </div>
                  <div class="frm-group">
                    <input id="re_password" name="re_password" placeholder="Confirmar password" type="password" required />
                  </div>
                  <div class="frm-group">
                    <input type="submit" value="criar nova conta" />
                  </div>
                </form>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>
    <!-- registration-section end -->
    {% include 'partials/footer.html' %}
    <!-- jquery js link -->
    <script src="assets/js/jquery-3.3.1.min.js"></script>
    <!-- jquery migrate js link -->
    <script src="assets/js/jquery-migrate-3.0.0.js"></script>
    <!-- bootstrap js link -->
    <script src="assets/js/bootstrap.min.js"></script>
    <!-- lightcase js link -->
    <script src="assets/js/lightcase.js"></script>
    <!-- wow js link -->
    <script src="assets/js/wow.min.js"></script>
    <!-- nice select js link -->
    <script src="assets/js/jquery.nice-select.min.js"></script>
    <!-- datepicker js link -->
    <script src="assets/js/datepicker.min.js"></script>
    <script src="assets/js/datepicker.en.js"></script>
    <!-- wickedpicker js link -->
    <script src="assets/js/wickedpicker.min.js"></script>
    <!-- owl carousel js link -->
    <script src="assets/js/owl.carousel.min.js"></script>
    <!-- jquery ui js link -->
    <script src="assets/js/jquery-ui.min.js"></script>
    <!-- main js link -->
    <script src="assets/js/main.js"></script>
    <script>
      // client-side password confirmation
      (function(){
        var form = document.querySelector('.registration-form');
        if (!form) return;
        form.addEventListener('submit', function(e){
          var p = document.getElementById('password').value;
          var rp = document.getElementById('re_password').value;
          if (p !== rp) {
            e.preventDefault();
            alert('As passwords não coincidem.');
            return false;
          }
        });
      })();
    </script>
  </body>
</html>
