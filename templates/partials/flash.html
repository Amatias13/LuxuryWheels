{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} mb-30" style="padding:12px 20px; margin-bottom:15px;">
        {{ message }}
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}
