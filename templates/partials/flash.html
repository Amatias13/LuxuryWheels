{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    {% for category, message in messages %}
      {% if category in ['modal', 'modal-error'] %}
        <div id="flash-modal-msg" data-message="{{ message|e }}" data-type="{{ category }}"></div>
      {% else %}
        <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} alert-dismissible fade show mb-30" role="alert" style="padding:12px 20px; margin-bottom:15px;">
          {{ message }}
          <button type="button" class="close" data-dismiss="alert" aria-label="Close" style="float:right;opacity:0.8">
            <span aria-hidden="true">&times;</span>
          </button>
        </div>
      {% endif %}
    {% endfor %}
  {% endif %}
{% endwith %}
